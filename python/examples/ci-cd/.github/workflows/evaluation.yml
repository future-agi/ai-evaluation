# GitHub Actions workflow for running AI evaluations
#
# This workflow runs your evaluation suite on every push and PR.
# Results are uploaded as artifacts and can optionally fail the build
# if evaluations don't meet thresholds.
#
# Setup:
# 1. Copy this file to your repo at .github/workflows/evaluation.yml
# 2. Add FI_API_KEY and FI_SECRET_KEY as repository secrets
# 3. Customize the evaluation configuration as needed

name: AI Evaluation

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # Allow manual trigger

env:
  PYTHON_VERSION: '3.11'

jobs:
  evaluate:
    name: Run Evaluations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ai-evaluation

      - name: Run evaluations with assertions
        env:
          FI_API_KEY: ${{ secrets.FI_API_KEY }}
          FI_SECRET_KEY: ${{ secrets.FI_SECRET_KEY }}
        run: |
          # Run evaluations with assertion checking
          # Exit code 0 = success, 2 = assertion failed, 3 = assertion warning (with --strict)
          fi run --output json -O results.json --check

          # Export results in multiple formats
          fi export --last -o results.xml -f junit
          fi export --last -o results.html -f html
        # The `fi run` command will fail the step if assertions fail

      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evaluation-results
          path: |
            results.json
            results.xml
            results.html
          retention-days: 30

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'results.xml'
          fail_on_failure: true
          include_passed: true

  # Optional: Run evaluations on multiple configurations
  matrix-evaluate:
    name: Evaluate ${{ matrix.config }}
    runs-on: ubuntu-latest
    if: false  # Set to true to enable matrix evaluation

    strategy:
      fail-fast: false
      matrix:
        config:
          - 'rag'
          - 'safety'
          - 'quality'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install ai-evaluation

      - name: Run ${{ matrix.config }} evaluations
        env:
          FI_API_KEY: ${{ secrets.FI_API_KEY }}
          FI_SECRET_KEY: ${{ secrets.FI_SECRET_KEY }}
        run: |
          fi run -c configs/${{ matrix.config }}.yaml -o json -O ${{ matrix.config }}-results.json

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config }}-results
          path: ${{ matrix.config }}-results.json
